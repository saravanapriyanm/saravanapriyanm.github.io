<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Notes — Encrypted URL Notes</title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0f13;
        --surface: #1a1a24;
        --surface2: #22222f;
        --border: #2e2e42;
        --accent: #7c6af7;
        --accent-hover: #6b5ae0;
        --accent-glow: rgba(124, 106, 247, 0.25);
        --success: #34d399;
        --danger: #f87171;
        --text: #e2e2f0;
        --text-muted: #8888aa;
        --radius: 12px;
        --radius-sm: 8px;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 48px;
      }

      /* ── Header ── */
      header {
        width: 100%;
        max-width: 720px;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 36px;
      }

      .logo {
        width: 40px;
        height: 40px;
        background: var(--accent);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
        box-shadow: 0 0 20px var(--accent-glow);
      }

      header h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }

      header p {
        font-size: 13px;
        color: var(--text-muted);
      }

      /* ── Card ── */
      .card {
        width: 100%;
        max-width: 720px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      }

      /* ── Mode tabs ── */
      .tabs {
        display: flex;
        gap: 4px;
        background: var(--bg);
        border-radius: var(--radius-sm);
        padding: 4px;
        margin-bottom: 24px;
      }

      .tab {
        flex: 1;
        padding: 9px 0;
        border: none;
        border-radius: calc(var(--radius-sm) - 2px);
        background: transparent;
        color: var(--text-muted);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }

      .tab.active {
        background: var(--surface2);
        color: var(--text);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      /* ── Form elements ── */
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 6px;
        letter-spacing: 0.3px;
      }

      textarea,
      input[type="text"],
      input[type="password"] {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-size: 15px;
        padding: 12px 14px;
        transition: border-color 0.15s, box-shadow 0.15s;
        outline: none;
        font-family: inherit;
      }

      textarea:focus,
      input[type="text"]:focus,
      input[type="password"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      textarea {
        resize: vertical;
        min-height: 180px;
        line-height: 1.6;
      }

      .field {
        margin-bottom: 18px;
      }

      /* ── Key input row ── */
      .key-row {
        position: relative;
      }

      .key-row input {
        padding-right: 44px;
      }

      .toggle-eye {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        font-size: 16px;
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 22px;
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s, box-shadow 0.15s, transform 0.1s;
      }

      .btn:active { transform: scale(0.97); }

      .btn-primary {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 4px 20px var(--accent-glow);
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--accent-hover);
        box-shadow: 0 6px 28px var(--accent-glow);
      }

      .btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn-ghost {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-ghost:hover { background: var(--border); }

      .btn-sm {
        padding: 8px 14px;
        font-size: 13px;
      }

      /* ── Actions row ── */
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 4px;
      }

      /* ── Result box ── */
      .result-box {
        margin-top: 24px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 16px;
      }

      .result-box label {
        margin-bottom: 8px;
      }

      .url-display {
        word-break: break-all;
        font-size: 13px;
        color: var(--accent);
        line-height: 1.6;
        margin-bottom: 12px;
        user-select: all;
        background: var(--bg);
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
      }

      /* ── Alert messages ── */
      .alert {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 13px 16px;
        border-radius: var(--radius-sm);
        font-size: 14px;
        margin-top: 16px;
        line-height: 1.5;
      }

      .alert-success {
        background: rgba(52, 211, 153, 0.1);
        border: 1px solid rgba(52, 211, 153, 0.3);
        color: var(--success);
      }

      .alert-error {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: var(--danger);
      }

      /* ── Decrypted note display ── */
      .decrypted-note {
        margin-top: 24px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-left: 3px solid var(--success);
        border-radius: var(--radius-sm);
        padding: 20px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 15px;
        line-height: 1.7;
        color: var(--text);
        min-height: 80px;
      }

      /* ── Separator ── */
      .divider {
        height: 1px;
        background: var(--border);
        margin: 24px 0;
      }

      /* ── Hint text ── */
      .hint {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 6px;
      }

      /* ── Loader spinner ── */
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Footer ── */
      footer {
        margin-top: 40px;
        font-size: 12px;
        color: var(--text-muted);
        text-align: center;
        line-height: 1.8;
      }

      footer a { color: var(--text-muted); }

      @media (max-width: 480px) {
        .card { padding: 20px; }
        .btn { width: 100%; justify-content: center; }
        .actions { flex-direction: column; }
      }
    </style>
  </head>
  <body x-data="secretNotes()" x-init="init()">

    <header>
      <div class="logo">🔐</div>
      <div>
        <h1>Secret Notes</h1>
        <p>End-to-end encrypted notes shared via URL — no backend, no account</p>
      </div>
    </header>

    <div class="card">

      <!-- Mode tabs -->
      <div class="tabs">
        <button
          class="tab"
          :class="{ active: mode === 'create' }"
          @click="switchMode('create')"
        >✏️ Create Note</button>
        <button
          class="tab"
          :class="{ active: mode === 'view' }"
          @click="switchMode('view')"
        >🔓 View Note</button>
      </div>

      <!-- ===== CREATE MODE ===== -->
      <template x-if="mode === 'create'">
        <div>
          <div class="field">
            <label for="note-content">Your note</label>
            <textarea
              id="note-content"
              x-model="noteContent"
              placeholder="Write your secret note here…"
              @input="clearResult()"
            ></textarea>
          </div>

          <div class="field">
            <label for="create-key">Encryption key</label>
            <div class="key-row">
              <input
                :type="showKey ? 'text' : 'password'"
                id="create-key"
                x-model="encryptionKey"
                placeholder="Choose a strong passphrase"
                @input="clearResult()"
                @keydown.enter="encrypt()"
              />
              <button
                class="toggle-eye"
                type="button"
                @click="showKey = !showKey"
                :aria-label="showKey ? 'Hide key' : 'Show key'"
                tabindex="-1"
              >
                <span x-text="showKey ? '🙈' : '👁️'"></span>
              </button>
            </div>
            <p class="hint">Share this key separately with the recipient — never include it in the URL.</p>
          </div>

          <div class="actions">
            <button
              class="btn btn-primary"
              @click="encrypt()"
              :disabled="!noteContent.trim() || !encryptionKey.trim() || loading"
            >
              <span x-show="loading" class="spinner"></span>
              <span x-text="loading ? 'Encrypting…' : '🔒 Encrypt & Get Link'"></span>
            </button>
            <button
              class="btn btn-ghost"
              @click="clearCreate()"
            >Clear</button>
          </div>

          <!-- Result: generated link -->
          <template x-if="generatedUrl">
            <div class="result-box">
              <label>🔗 Shareable encrypted link</label>
              <div class="url-display" x-text="generatedUrl"></div>
              <div class="actions">
                <button class="btn btn-ghost btn-sm" @click="copyUrl()">
                  <span x-text="copied ? '✅ Copied!' : '📋 Copy link'"></span>
                </button>
                <button class="btn btn-ghost btn-sm" @click="openInNewTab()">↗ Open link</button>
              </div>
            </div>
          </template>

          <template x-if="errorMsg && mode === 'create'">
            <div class="alert alert-error">⚠️ <span x-text="errorMsg"></span></div>
          </template>
        </div>
      </template>

      <!-- ===== VIEW MODE ===== -->
      <template x-if="mode === 'view'">
        <div>
          <template x-if="!hasPayload">
            <div>
              <p style="color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 16px;">
                No encrypted note found in the URL.<br>
                Switch to <strong style="color: var(--text)">Create Note</strong> to make one, or paste a secret-notes link in your browser.
              </p>
              <div class="actions">
                <button class="btn btn-primary" @click="switchMode('create')">✏️ Create a Note</button>
              </div>
            </div>
          </template>

          <template x-if="hasPayload">
            <div>
              <div class="alert alert-success" style="margin-top: 0; margin-bottom: 20px;">
                🔒 An encrypted note is loaded. Enter the key to reveal it.
              </div>

              <div class="field">
                <label for="view-key">Encryption key</label>
                <div class="key-row">
                  <input
                    :type="showKey ? 'text' : 'password'"
                    id="view-key"
                    x-model="encryptionKey"
                    placeholder="Enter the passphrase shared with you"
                    @keydown.enter="decrypt()"
                  />
                  <button
                    class="toggle-eye"
                    type="button"
                    @click="showKey = !showKey"
                    :aria-label="showKey ? 'Hide key' : 'Show key'"
                    tabindex="-1"
                  >
                    <span x-text="showKey ? '🙈' : '👁️'"></span>
                  </button>
                </div>
              </div>

              <div class="actions">
                <button
                  class="btn btn-primary"
                  @click="decrypt()"
                  :disabled="!encryptionKey.trim() || loading"
                >
                  <span x-show="loading" class="spinner"></span>
                  <span x-text="loading ? 'Decrypting…' : '🔓 Decrypt Note'"></span>
                </button>
                <button class="btn btn-ghost" @click="switchMode('create')">✏️ Create New</button>
              </div>

              <template x-if="errorMsg && mode === 'view'">
                <div class="alert alert-error">
                  ❌ <span x-text="errorMsg"></span>
                </div>
              </template>

              <template x-if="decryptedNote !== null">
                <div>
                  <div class="divider"></div>
                  <label style="margin-bottom: 10px; display: block;">📝 Decrypted note</label>
                  <div class="decrypted-note" x-text="decryptedNote"></div>
                  <div class="actions" style="margin-top: 14px;">
                    <button class="btn btn-ghost btn-sm" @click="copyDecrypted()">
                      <span x-text="copiedDecrypted ? '✅ Copied!' : '📋 Copy note'"></span>
                    </button>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>

    </div>

    <footer>
      <p>All encryption happens in your browser. The server never sees your note or key.</p>
      <p>Uses AES-GCM 256-bit encryption with PBKDF2 key derivation.</p>
      <p style="margin-top: 8px;"><a href="/">← saravanapriyanm.github.io</a></p>
    </footer>

    <script>
      // ── Crypto helpers using the Web Crypto API ──────────────────────────────

      const PBKDF2_ITERATIONS = 600_000;
      const SALT_BYTES        = 16;
      const IV_BYTES          = 12;

      /** Encode a Uint8Array to a URL-safe base64 string (no padding). */
      function toBase64url(buf) {
        return btoa(String.fromCharCode(...new Uint8Array(buf)))
          .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      }

      /** Decode a URL-safe base64 string to a Uint8Array. */
      function fromBase64url(str) {
        const padded = str.replace(/-/g, '+').replace(/_/g, '/')
          + '='.repeat((4 - str.length % 4) % 4);
        const binary = atob(padded);
        const result = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) result[i] = binary.charCodeAt(i);
        return result;
      }

      /** Derive an AES-GCM CryptoKey from a passphrase + salt using PBKDF2. */
      async function deriveKey(passphrase, salt) {
        const enc     = new TextEncoder();
        const keyMat  = await crypto.subtle.importKey(
          'raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']
        );
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt, hash: 'SHA-256', iterations: PBKDF2_ITERATIONS },
          keyMat,
          { name: 'AES-GCM', length: 256 },
          false,
          ['encrypt', 'decrypt']
        );
      }

      /**
       * Encrypt plaintext with passphrase.
       * Returns a URL-safe base64 string: salt(16B) + iv(12B) + ciphertext.
       */
      async function encryptNote(plaintext, passphrase) {
        const enc       = new TextEncoder();
        const salt      = crypto.getRandomValues(new Uint8Array(SALT_BYTES));
        const iv        = crypto.getRandomValues(new Uint8Array(IV_BYTES));
        const key       = await deriveKey(passphrase, salt);
        const cipherBuf = await crypto.subtle.encrypt(
          { name: 'AES-GCM', iv },
          key,
          enc.encode(plaintext)
        );
        // Concatenate salt | iv | ciphertext
        const combined = new Uint8Array(SALT_BYTES + IV_BYTES + cipherBuf.byteLength);
        combined.set(salt, 0);
        combined.set(iv, SALT_BYTES);
        combined.set(new Uint8Array(cipherBuf), SALT_BYTES + IV_BYTES);
        return toBase64url(combined);
      }

      /**
       * Decrypt a payload (base64url string produced by encryptNote) with passphrase.
       * Returns plaintext string, or throws on wrong key / corrupted data.
       */
      async function decryptNote(payload, passphrase) {
        const combined  = fromBase64url(payload);
        const salt      = combined.slice(0, SALT_BYTES);
        const iv        = combined.slice(SALT_BYTES, SALT_BYTES + IV_BYTES);
        const cipher    = combined.slice(SALT_BYTES + IV_BYTES);
        const key       = await deriveKey(passphrase, salt);
        const plainBuf  = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          key,
          cipher
        );
        return new TextDecoder().decode(plainBuf);
      }

      // ── Alpine component ─────────────────────────────────────────────────────

      function secretNotes() {
        return {
          mode:           'create',   // 'create' | 'view'
          noteContent:    '',
          encryptionKey:  '',
          showKey:        false,
          loading:        false,
          generatedUrl:   '',
          decryptedNote:  null,
          errorMsg:       '',
          copied:         false,
          copiedDecrypted: false,
          hasPayload:     false,

          init() {
            const hash = window.location.hash.slice(1); // strip leading '#'
            if (hash) {
              this.hasPayload = true;
              this.mode = 'view';
            }
            // Listen for hash changes (e.g. user pastes a link)
            window.addEventListener('hashchange', () => {
              const h = window.location.hash.slice(1);
              if (h) {
                this.hasPayload = true;
                this.mode = 'view';
                this.decryptedNote = null;
                this.errorMsg = '';
                this.encryptionKey = '';
              } else {
                this.hasPayload = false;
              }
            });
          },

          switchMode(m) {
            this.mode = m;
            this.errorMsg = '';
            if (m === 'create') {
              this.decryptedNote = null;
            } else {
              this.generatedUrl = '';
            }
          },

          clearResult() {
            this.generatedUrl = '';
            this.errorMsg = '';
            this.copied = false;
          },

          clearCreate() {
            this.noteContent = '';
            this.encryptionKey = '';
            this.generatedUrl = '';
            this.errorMsg = '';
            this.copied = false;
          },

          async encrypt() {
            if (!this.noteContent.trim() || !this.encryptionKey.trim()) return;
            this.loading    = true;
            this.errorMsg   = '';
            this.generatedUrl = '';
            try {
              const payload = await encryptNote(this.noteContent, this.encryptionKey);
              // Put payload in the hash so it never touches the server
              const url = `${location.origin}${location.pathname}#${payload}`;
              this.generatedUrl = url;
            } catch (err) {
              this.errorMsg = 'Encryption failed: ' + err.message;
            } finally {
              this.loading = false;
            }
          },

          async decrypt() {
            if (!this.encryptionKey.trim()) return;
            const payload = window.location.hash.slice(1);
            if (!payload) {
              this.errorMsg = 'No encrypted note found in the URL.';
              return;
            }
            this.loading       = true;
            this.errorMsg      = '';
            this.decryptedNote = null;
            try {
              const plain        = await decryptNote(payload, this.encryptionKey);
              this.decryptedNote = plain;
            } catch (err) {
              console.error('Decryption error:', err);
              this.errorMsg = 'Decryption failed. Make sure you entered the correct key.';
            } finally {
              this.loading = false;
            }
          },

          async copyUrl() {
            try {
              await navigator.clipboard.writeText(this.generatedUrl);
              this.copied = true;
              setTimeout(() => (this.copied = false), 2500);
            } catch {
              /* clipboard API unavailable */
            }
          },

          async copyDecrypted() {
            try {
              await navigator.clipboard.writeText(this.decryptedNote);
              this.copiedDecrypted = true;
              setTimeout(() => (this.copiedDecrypted = false), 2500);
            } catch {
              /* clipboard API unavailable */
            }
          },

          openInNewTab() {
            if (this.generatedUrl) window.open(this.generatedUrl, '_blank');
          },
        };
      }
    </script>
  </body>
</html>
