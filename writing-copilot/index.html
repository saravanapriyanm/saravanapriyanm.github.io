<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing Copilot - AI-Powered Markdown Editor</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
</head>

<body>
  <div x-data="writingCopilot()" x-init="init()" class="container">
    <!-- Editor Container -->
    <div class="editor-container">
      <!-- Editor Panel -->
      <div class="editor-panel">
        <div class="panel-header">
          <div class="panel-title">
            <span>Markdown Editor</span>
          </div>
          <div class="panel-divider"></div>
          <button @click="toggleAiSuggestions()" class="panel-header-btn" title="AI Suggestions"
            :disabled="!aiConfigured">
            ⚡ AI
          </button>
        </div>
        <div class="editor-content" style="position: relative;">
          <textarea x-ref="editor" x-model="markdown" @input="updatePreview()" @keydown="handleKeyDown($event)"
            @mouseup="handleTextSelection($event)" class="editor-textarea" aria-label="Markdown Editor" placeholder="Start writing in markdown...

# Heading 1
## Heading 2

**Bold text** and *italic text*

- List item 1
- List item 2

[Link](https://example.com)"></textarea>
          <div x-show="showAutofill" x-text="autofillSuggestion" class="autofill-suggestion" :style="autofillPosition">
          </div>
        </div>

        <!-- AI Suggestions Panel -->
        <div x-show="showAiSuggestions" @keydown.escape="showAiSuggestions = false"
          @keydown.arrow-down.prevent="navigateSuggestions(1)" @keydown.arrow-up.prevent="navigateSuggestions(-1)"
          @keydown.enter.prevent="applySuggestion()" @keydown.space.prevent="applySuggestion()"
          class="ai-suggestions-panel">
          <div class="ai-suggestions-header">
            <span>✨ AI Suggestions</span>
            <button @click="showAiSuggestions = false" class="close-btn">✕</button>
          </div>
          <div class="ai-suggestions-content">
            <div x-show="loadingSuggestions" class="suggestion-loading">
              <span>Generating suggestions...</span>
            </div>
            <template x-for="(suggestion, index) in aiSuggestions" :key="index">
              <div @click="applySuggestion(index)" @mouseenter="selectedSuggestion = index"
                :class="{ 'active': selectedSuggestion === index }" class="suggestion-item">
                <span class="suggestion-number" x-text="index + 1"></span>
                <span class="suggestion-text" x-text="suggestion"></span>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Preview Panel -->
      <div class="preview-panel">
        <div class="panel-header">
          <div class="panel-title">
            <span>Live Preview</span>
          </div>
        </div>
        <div class="preview-content" x-html="DOMPurify.sanitize(preview)"></div>
      </div>
    </div>

    <!-- Floating Action Button Menu -->
    <div class="fab-container">
      <div class="fab-menu" x-show="showFabMenu" @click.away="showFabMenu = false">
        <button @click="clearEditor(); showFabMenu = false" class="fab-menu-item" title="Clear">
          🗑️ <span>Clear</span>
        </button>
        <button @click="showSettings = true; showFabMenu = false" class="fab-menu-item" title="Settings">
          ⚙️ <span>Settings</span>
        </button>
      </div>
      <button @click="showFabMenu = !showFabMenu" class="fab-button" :class="{ 'active': showFabMenu }">
        <span x-show="!showFabMenu">⋮</span>
        <span x-show="showFabMenu">✕</span>
      </button>
      <div class="fab-status">
        <span x-show="aiConfigured" class="status-dot connected" title="AI Enabled"></span>
        <span x-show="!aiConfigured" class="status-dot disconnected" title="AI Not Configured"></span>
      </div>
    </div>

    <!-- Context Menu for Synonyms -->
    <div x-show="showContextMenu" @click.away="showContextMenu = false" class="context-menu"
      :style="contextMenuPosition">
      <div class="context-menu-item" style="font-weight: 600; color: #666; cursor: default;">
        Suggestions for "<span x-text="selectedWord"></span>"
      </div>
      <div class="context-menu-divider"></div>
      <template x-for="synonym in synonyms" :key="synonym">
        <div @click="replaceSynonym(synonym)" class="context-menu-item" x-text="synonym"></div>
      </template>
      <div x-show="synonyms.length === 0" class="context-menu-item" style="color: #999;">
        <span x-show="!aiConfigured">Configure AI for suggestions</span>
        <span x-show="aiConfigured">Loading suggestions...</span>
      </div>
    </div>

    <!-- Settings Modal -->
    <div x-show="showSettings" class="modal-overlay" @click.self="showSettings = false">
      <div class="modal">
        <div class="modal-header">
          <h2>⚙️ AI Settings</h2>
          <button @click="showSettings = false" class="modal-close" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>AI Provider</label>
            <select x-model="settings.provider">
              <option value="">Select Provider</option>
              <option value="azure">Azure OpenAI</option>
              <option value="gemini">Google Gemini</option>
            </select>
          </div>

          <template x-if="settings.provider === 'azure'">
            <div>
              <div class="form-group">
                <label>Azure OpenAI Endpoint</label>
                <input type="text" x-model="settings.azureEndpoint"
                  placeholder="https://your-resource.openai.azure.com/" />
                <small>Your Azure OpenAI resource endpoint. <a
                    href="https://learn.microsoft.com/en-us/azure/ai-services/openai/quickstart" target="_blank"
                    rel="noopener">Learn how to get your API key →</a></small>
              </div>
              <div class="form-group">
                <label>API Key</label>
                <input type="password" x-model="settings.azureApiKey" placeholder="Enter your Azure OpenAI API key" />
                <small>Found in Azure Portal under Keys and Endpoint</small>
              </div>
              <div class="form-group">
                <label>Deployment Name</label>
                <input type="text" x-model="settings.azureDeployment" placeholder="gpt-4" />
                <small>The name of your model deployment</small>
              </div>
            </div>
          </template>

          <template x-if="settings.provider === 'gemini'">
            <div>
              <div class="form-group">
                <label>Gemini API Key</label>
                <input type="password" x-model="settings.geminiApiKey" placeholder="Enter your Gemini API key" />
                <small>Get your API key from <a href="https://aistudio.google.com/app/apikey" target="_blank"
                    rel="noopener">Google AI Studio →</a></small>
              </div>
              <div class="form-group">
                <label>Model</label>
                <select x-model="settings.geminiModel">
                  <option value="gemini-pro">Gemini Pro</option>
                  <option value="gemini-pro-latest">Gemini Pro Latest</option>
                </select>
              </div>
            </div>
          </template>

          <div x-show="settings.provider" class="form-group">
            <button @click="validateCredentials()" class="btn btn-primary" style="width: 100%;">
              Validate & Save Configuration
            </button>
          </div>

          <div x-show="validationMessage"
            :class="validationSuccess ? 'status-indicator connected' : 'status-indicator disconnected'"
            style="margin-top: 15px; width: 100%; justify-content: center;">
            <span x-text="validationMessage"></span>
          </div>
        </div>
        <div class="modal-footer">
          <button @click="clearSettings()" class="btn btn-secondary">Clear Settings</button>
          <button @click="showSettings = false" class="btn btn-primary">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function writingCopilot() {
      return {
        markdown: '',
        preview: '',
        showContextMenu: false,
        contextMenuPosition: {},
        selectedWord: '',
        selectedRange: null,
        synonyms: [],
        showAutofill: false,
        autofillSuggestion: '',
        autofillPosition: {},
        showSettings: false,
        showFabMenu: false,
        showAiSuggestions: false,
        aiSuggestions: [],
        selectedSuggestion: 0,
        loadingSuggestions: false,
        aiConfigured: false,
        settings: {
          provider: '',
          azureEndpoint: '',
          azureApiKey: '',
          azureDeployment: '',
          geminiApiKey: '',
          geminiModel: 'gemini-pro'
        },
        validationMessage: '',
        validationSuccess: false,

        init() {
          // Load settings from localStorage
          const savedSettings = localStorage.getItem('writingCopilotSettings');
          if (savedSettings) {
            this.settings = JSON.parse(savedSettings);
            this.aiConfigured = true;
          }

          // Load saved markdown if exists
          const savedMarkdown = localStorage.getItem('writingCopilotMarkdown');
          if (savedMarkdown) {
            this.markdown = savedMarkdown;
            this.updatePreview();
          }

          // Auto-save markdown
          setInterval(() => {
            if (this.markdown) {
              localStorage.setItem('writingCopilotMarkdown', this.markdown);
            }
          }, 5000);
        },

        updatePreview() {
          this.preview = marked.parse(this.markdown);
        },

        handleTextSelection(event) {
          setTimeout(() => {
            const selection = window.getSelection();
            const selectedText = selection.toString().trim();

            if (selectedText && selectedText.split(/\s+/).length === 1) {
              this.selectedWord = selectedText;
              this.selectedRange = {
                start: this.$refs.editor.selectionStart,
                end: this.$refs.editor.selectionEnd
              };

              // Position context menu
              const rect = event.target.getBoundingClientRect();
              this.contextMenuPosition = {
                top: `${event.clientY}px`,
                left: `${event.clientX}px`
              };

              this.showContextMenu = true;
              this.getSynonyms(selectedText);
            } else {
              this.showContextMenu = false;
            }
          }, 10);
        },

        async getSynonyms(word) {
          this.synonyms = [];

          if (!this.aiConfigured) {
            return;
          }

          try {
            if (this.settings.provider === 'azure') {
              await this.getSynonymsFromAzure(word);
            } else if (this.settings.provider === 'gemini') {
              await this.getSynonymsFromGemini(word);
            }
          } catch (error) {
            console.error('Error getting synonyms:', error);
            // Fallback to simple synonyms
            this.synonyms = this.getFallbackSynonyms(word);
          }
        },

        async getSynonymsFromAzure(word) {
          const url = `${this.settings.azureEndpoint}/openai/deployments/${this.settings.azureDeployment}/chat/completions?api-version=2024-02-15-preview`;

          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'api-key': this.settings.azureApiKey
            },
            body: JSON.stringify({
              messages: [
                {
                  role: 'system',
                  content: 'You are a helpful writing assistant. Provide 5 synonyms for the given word. Return only the synonyms as a comma-separated list, nothing else.'
                },
                {
                  role: 'user',
                  content: `Give me 5 synonyms for: ${word}`
                }
              ],
              max_tokens: 50,
              temperature: 0.7
            })
          });

          if (!response.ok) {
            throw new Error('API request failed');
          }

          const data = await response.json();
          if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
            const synonymsText = data.choices[0].message.content.trim();
            this.synonyms = synonymsText.split(',').map(s => s.trim()).filter(s => s);
          } else {
            throw new Error('Unexpected API response format');
          }
        },

        async getSynonymsFromGemini(word) {
          const url = `https://generativelanguage.googleapis.com/v1/models/${this.settings.geminiModel}:generateContent?key=${this.settings.geminiApiKey}`;

          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              contents: [{
                parts: [{
                  text: `Give me 5 synonyms for the word "${word}". Return only the synonyms as a comma-separated list, nothing else.`
                }]
              }],
              generationConfig: {
                temperature: 0.7,
                maxOutputTokens: 50
              }
            })
          });

          if (!response.ok) {
            throw new Error('API request failed');
          }

          const data = await response.json();
          if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
            const synonymsText = data.candidates[0].content.parts[0].text.trim();
            this.synonyms = synonymsText.split(',').map(s => s.trim()).filter(s => s);
          } else {
            throw new Error('Unexpected API response format');
          }
        },

        getFallbackSynonyms(word) {
          // Simple fallback synonyms database
          const synonymsDB = {
            'good': ['great', 'excellent', 'fine', 'nice', 'wonderful'],
            'bad': ['poor', 'terrible', 'awful', 'horrible', 'dreadful'],
            'big': ['large', 'huge', 'enormous', 'massive', 'gigantic'],
            'small': ['tiny', 'little', 'miniature', 'petite', 'compact'],
            'happy': ['joyful', 'cheerful', 'delighted', 'pleased', 'content'],
            'sad': ['unhappy', 'sorrowful', 'melancholy', 'gloomy', 'depressed'],
            'fast': ['quick', 'rapid', 'swift', 'speedy', 'hasty'],
            'slow': ['sluggish', 'leisurely', 'gradual', 'unhurried', 'deliberate'],
            'smart': ['intelligent', 'clever', 'bright', 'brilliant', 'wise'],
            'important': ['significant', 'crucial', 'vital', 'essential', 'critical']
          };

          return synonymsDB[word.toLowerCase()] || ['No suggestions available'];
        },

        replaceSynonym(synonym) {
          if (this.selectedRange && synonym !== 'No suggestions available') {
            const before = this.markdown.substring(0, this.selectedRange.start);
            const after = this.markdown.substring(this.selectedRange.end);
            this.markdown = before + synonym + after;
            this.updatePreview();
          }
          this.showContextMenu = false;
        },

        async handleKeyDown(event) {
          // Handle Tab key for autofill
          if (event.key === 'Tab' && this.showAutofill) {
            event.preventDefault();
            this.acceptAutofill();
            return;
          }
        },

        async generateAutofill() {
          if (!this.aiConfigured) return;

          const cursorPos = this.$refs.editor.selectionStart;
          const textBeforeCursor = this.markdown.substring(0, cursorPos);
          const lastLines = textBeforeCursor.split('\n').slice(-3).join('\n');

          if (lastLines.trim().length < 10) return;

          try {
            let suggestion = '';
            if (this.settings.provider === 'azure') {
              suggestion = await this.getAutofillFromAzure(lastLines);
            } else if (this.settings.provider === 'gemini') {
              suggestion = await this.getAutofillFromGemini(lastLines);
            }

            if (suggestion) {
              this.autofillSuggestion = suggestion;
              this.showAutofill = true;

              // Auto-hide after 10 seconds
              setTimeout(() => {
                this.showAutofill = false;
              }, 10000);
            }
          } catch (error) {
            console.error('Error generating autofill:', error);
          }
        },

        async toggleAiSuggestions() {
          if (!this.aiConfigured) return;

          this.showAiSuggestions = !this.showAiSuggestions;

          if (this.showAiSuggestions) {
            this.selectedSuggestion = 0;
            this.loadingSuggestions = true;
            this.aiSuggestions = [];

            const cursorPos = this.$refs.editor.selectionStart;
            const textBeforeCursor = this.markdown.substring(0, cursorPos);
            const context = textBeforeCursor.split('\n').slice(-5).join('\n');

            try {
              await this.generateAiSuggestions(context);
            } catch (error) {
              console.error('Error generating suggestions:', error);
            }

            this.loadingSuggestions = false;
          }
        },

        async generateAiSuggestions(context) {
          if (this.settings.provider === 'azure') {
            await this.getAiSuggestionsFromAzure(context);
          } else if (this.settings.provider === 'gemini') {
            await this.getAiSuggestionsFromGemini(context);
          }
        },

        async getAiSuggestionsFromAzure(context) {
          const url = `${this.settings.azureEndpoint}/openai/deployments/${this.settings.azureDeployment}/chat/completions?api-version=2024-02-15-preview`;

          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'api-key': this.settings.azureApiKey
            },
            body: JSON.stringify({
              messages: [
                {
                  role: 'system',
                  content: 'You are a writing assistant. Provide 3 different ways to continue the text. Return only the suggestions, each on a new line, numbered 1-3.'
                },
                {
                  role: 'user',
                  content: `Provide 3 different ways to continue this text:\n\n${context}`
                }
              ],
              max_tokens: 200,
              temperature: 0.8
            })
          });

          if (!response.ok) throw new Error('API request failed');

          const data = await response.json();
          if (data.choices && data.choices[0] && data.choices[0].message) {
            const text = data.choices[0].message.content.trim();
            this.aiSuggestions = text.split('\n').filter(s => s.trim()).map(s => s.replace(/^\d+\.\s*/, '').trim());
          }
        },

        async getAiSuggestionsFromGemini(context) {
          const url = `https://generativelanguage.googleapis.com/v1/models/${this.settings.geminiModel}:generateContent?key=${this.settings.geminiApiKey}`;

          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              contents: [{
                parts: [{
                  text: `Provide 3 different ways to continue this text. Return only the suggestions, each on a new line, numbered 1-3:\n\n${context}`
                }]
              }],
              generationConfig: {
                temperature: 0.8,
                maxOutputTokens: 200
              }
            })
          });

          if (!response.ok) throw new Error('API request failed');

          const data = await response.json();
          if (data.candidates && data.candidates[0] && data.candidates[0].content) {
            const text = data.candidates[0].content.parts[0].text.trim();
            this.aiSuggestions = text.split('\n').filter(s => s.trim()).map(s => s.replace(/^\d+\.\s*/, '').trim());
          }
        },

        navigateSuggestions(direction) {
          if (!this.showAiSuggestions || this.aiSuggestions.length === 0) return;

          this.selectedSuggestion = (this.selectedSuggestion + direction + this.aiSuggestions.length) % this.aiSuggestions.length;
        },

        applySuggestion(index) {
          const suggestionIndex = index !== undefined ? index : this.selectedSuggestion;
          const suggestion = this.aiSuggestions[suggestionIndex];

          if (suggestion) {
            const cursorPos = this.$refs.editor.selectionStart;
            const before = this.markdown.substring(0, cursorPos);
            const after = this.markdown.substring(cursorPos);
            this.markdown = before + ' ' + suggestion + after;
            this.updatePreview();
            this.showAiSuggestions = false;
          }
        },

        async getAutofillFromAzure(context) {
          const url = `${this.settings.azureEndpoint}/openai/deployments/${this.settings.azureDeployment}/chat/completions?api-version=2024-02-15-preview`;

          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'api-key': this.settings.azureApiKey
            },
            body: JSON.stringify({
              messages: [
                {
                  role: 'system',
                  content: 'You are a writing assistant. Continue the text naturally with one sentence. Return only the next sentence, nothing else.'
                },
                {
                  role: 'user',
                  content: `Continue this text with one sentence:\n\n${context}`
                }
              ],
              max_tokens: 50,
              temperature: 0.8
            })
          });

          if (!response.ok) {
            throw new Error('API request failed');
          }

          const data = await response.json();
          if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
            return data.choices[0].message.content.trim();
          } else {
            throw new Error('Unexpected API response format');
          }
        },

        async getAutofillFromGemini(context) {
          const url = `https://generativelanguage.googleapis.com/v1/models/${this.settings.geminiModel}:generateContent?key=${this.settings.geminiApiKey}`;

          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              contents: [{
                parts: [{
                  text: `Continue this text with one natural sentence. Return only the next sentence:\n\n${context}`
                }]
              }],
              generationConfig: {
                temperature: 0.8,
                maxOutputTokens: 50
              }
            })
          });

          if (!response.ok) {
            throw new Error('API request failed');
          }

          const data = await response.json();
          if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
            return data.candidates[0].content.parts[0].text.trim();
          } else {
            throw new Error('Unexpected API response format');
          }
        },

        acceptAutofill() {
          if (this.autofillSuggestion) {
            const cursorPos = this.$refs.editor.selectionStart;
            const before = this.markdown.substring(0, cursorPos);
            const after = this.markdown.substring(cursorPos);
            this.markdown = before + this.autofillSuggestion + after;
            this.updatePreview();
            this.showAutofill = false;
            this.autofillSuggestion = '';
          }
        },

        async validateCredentials() {
          this.validationMessage = 'Validating...';
          this.validationSuccess = false;

          try {
            let isValid = false;

            if (this.settings.provider === 'azure') {
              isValid = await this.validateAzure();
            } else if (this.settings.provider === 'gemini') {
              isValid = await this.validateGemini();
            }

            if (isValid) {
              this.validationMessage = '✓ Configuration validated and saved!';
              this.validationSuccess = true;
              localStorage.setItem('writingCopilotSettings', JSON.stringify(this.settings));
              this.aiConfigured = true;

              setTimeout(() => {
                this.showSettings = false;
                this.validationMessage = '';
              }, 2000);
            } else {
              this.validationMessage = '✗ Validation failed. Please check your credentials.';
              this.validationSuccess = false;
            }
          } catch (error) {
            console.error('Validation error:', error);
            this.validationMessage = '✗ Error: ' + error.message;
            this.validationSuccess = false;
          }
        },

        async validateAzure() {
          const url = `${this.settings.azureEndpoint}/openai/deployments/${this.settings.azureDeployment}/chat/completions?api-version=2024-02-15-preview`;

          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'api-key': this.settings.azureApiKey
            },
            body: JSON.stringify({
              messages: [
                { role: 'user', content: 'Hello' }
              ],
              max_tokens: 5
            })
          });

          return response.ok;
        },

        async validateGemini() {
          const url = `https://generativelanguage.googleapis.com/v1/models/${this.settings.geminiModel}:generateContent?key=${this.settings.geminiApiKey}`;

          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              contents: [{
                parts: [{ text: 'Hello' }]
              }]
            })
          });

          return response.ok;
        },

        clearSettings() {
          this.settings = {
            provider: '',
            azureEndpoint: '',
            azureApiKey: '',
            azureDeployment: '',
            geminiApiKey: '',
            geminiModel: 'gemini-pro'
          };
          localStorage.removeItem('writingCopilotSettings');
          this.aiConfigured = false;
          this.validationMessage = 'Settings cleared';
          this.validationSuccess = false;
        },

        clearEditor() {
          if (confirm('Are you sure you want to clear the editor?')) {
            this.markdown = '';
            this.preview = '';
            localStorage.removeItem('writingCopilotMarkdown');
          }
        }
      };
    }
  </script>
</body>

</html>
